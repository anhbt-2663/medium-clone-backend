services:
  db:
    image: postgres:15-alpine
    container_name: medium_db_pg
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: medium_clone_db
    ports:
      - '5432:5432' # Cổng mặc định của Postgres
    volumes:
      - pg_data:/var/lib/postgresql/data

